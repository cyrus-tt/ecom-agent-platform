# ─── 指标定义 ────────────────────────────────────────────────────────────────
# sql 字段中用 {channel} 占位，运行时替换为具体渠道的列名

metrics:
  gmv:
    label: GMV（出库金额）
    description: 渠道销量 × 吊牌价 × 折扣率。全渠道时用 sales_total_amount
    sql_channel: "coalesce(sum({sales_qty_col} * tag_price * coalesce(nullif({sku_discount_col}, 0), nullif({style_discount_col}, 0), 1.0)), 0)"
    sql_total: "coalesce(sum(sales_total_amount), 0)"
    unit: 元
    agg: sum

  tag_amount:
    label: 吊牌金额
    description: 销量 × 吊牌价（不含折扣）
    sql_channel: "coalesce(sum({sales_qty_col} * tag_price), 0)"
    sql_total: "coalesce(sum(sales_total_tag_amount), 0)"
    unit: 元
    agg: sum

  sales_qty:
    label: 销量
    description: 渠道销售件数
    sql_channel: "coalesce(sum({sales_qty_col}), 0)"
    sql_total: "coalesce(sum(sales_total_qty), 0)"
    unit: 件
    agg: sum

  inventory_qty:
    label: 库存
    description: 渠道库存件数（来自库存快照表）
    sql_channel: "coalesce(sum({inventory_qty_col}), 0)"
    sql_total: "coalesce(sum(inventory_total_qty), 0)"
    unit: 件
    agg: sum
    table: rpt_inventory_sku_latest

  sku_count:
    label: 动销 SKU 数
    description: 有销量的不同 SKU 数
    sql_channel: "count(distinct case when {sales_qty_col} > 0 then sku end)"
    sql_total: "count(distinct case when sales_total_qty > 0 then sku end)"
    unit: 个
    agg: count_distinct

  avg_discount:
    label: 平均折扣率
    description: 渠道 SKU 级折扣率均值（0~1，1 = 不打折）
    sql_channel: "avg(nullif({sku_discount_col}, 0))"
    sql_total: "avg(nullif(sku_discount_total, 0))"
    unit: ""
    agg: avg

  sell_through_rate:
    label: 动销率
    description: 有销量 SKU 数 / 总 SKU 数（需 JOIN 库存表）
    derived: true
    formula: "sku_count / total_sku_count"
    unit: "%"

  days_of_supply:
    label: 库存可售天数
    description: 当前库存 / 近 7 日日均销量
    derived: true
    formula: "inventory_qty / (sales_qty_7d / 7)"
    unit: 天

# ─── 维度 ────────────────────────────────────────────────────────────────────

dimensions:
  channel:
    label: 渠道
    description: 22 个销售渠道（见 channels 节）
    type: enum
    values_ref: channels

  category:
    label: 品类
    column: category
    coalesce: "coalesce(nullif(trim(category), ''), '未分类')"
    table: [rpt_sales_sku_daily, rpt_inventory_sku_latest]

  major_category:
    label: 大品类
    column: major_category
    coalesce: "coalesce(nullif(trim(major_category), ''), '未标记大类')"
    table: [rpt_sales_sku_daily, rpt_inventory_sku_latest]

  gender:
    label: 性别
    column: gender
    coalesce: "coalesce(nullif(trim(gender), ''), '未标记')"
    table: [rpt_sales_sku_daily, rpt_inventory_sku_latest]

  season:
    label: 产品季
    column: season
    coalesce: "coalesce(nullif(trim(season), ''), '未标记产品季')"
    table: [rpt_sales_sku_daily, rpt_inventory_sku_latest]

  sales_date:
    label: 销售日期
    column: sales_date
    type: date
    granularity: [day, week, month]
    table: [rpt_sales_sku_daily]

  style:
    label: 款号
    column: style
    coalesce: "coalesce(nullif(trim(style), ''), '未标记款号')"
    table: [rpt_sales_sku_daily, rpt_inventory_sku_latest]

  sku:
    label: SKU/货号
    column: sku
    table: [rpt_sales_sku_daily, rpt_inventory_sku_latest]

  story_pack:
    label: 故事包
    column: story_pack
    table: [rpt_sales_sku_daily, rpt_inventory_sku_latest]

# ─── 表关系 ──────────────────────────────────────────────────────────────────

relationships:
  - from: rpt_sales_sku_daily
    to: rpt_inventory_sku_latest
    join: "rpt_sales_sku_daily.sku = rpt_inventory_sku_latest.sku"
    type: many_to_one
    description: 销售表的 SKU 关联到库存快照表获取库存数量

# ─── 全局过滤器 ──────────────────────────────────────────────────────────────

global_filters:
  sku_filter:
    description: 排除测试/无效 SKU（含 u 或 v 的货号）
    sql: "coalesce(sku, '') not ilike '%u%' and coalesce(sku, '') not ilike '%v%'"
    always_apply: true

# ─── 检测规则（巡检引擎读取）─────────────────────────────────────────────────

detection_rules:
  sales_drop_dod:
    label: 日环比 GMV 下跌
    description: 按渠道比较昨日 vs 前日 GMV
    warn_threshold: 10
    crit_threshold: 25
    unit: "%"
    lookback_days: 2

  sales_drop_wow:
    label: 周环比 GMV 下跌
    description: 按渠道比较近 7 日 vs 前 7 日 GMV
    warn_threshold: 15
    crit_threshold: 30
    unit: "%"
    lookback_days: 14

  zero_sales_sku:
    label: 零销售 SKU
    description: 近 14 天有数据但近 7 天销量为 0 的 SKU，按品类分组
    min_count: 20
    severity: warning
    lookback_days: 14

  new_product_underperform:
    label: 新品零销售
    description: 近 14 天内首次出现的 SKU 至今零销量
    age_buckets:
      - range: "0-7天"
        severity: info
      - range: "7-14天"
        severity: warning
    lookback_days: 14

# ─── Few-shot 示例（NL2SQL 用）───────────────────────────────────────────────

examples:
  - question: "上周户外渠道 GMV 多少？"
    sql: |
      SELECT coalesce(sum(sales_outdoor_qty * tag_price * coalesce(nullif(sku_discount_outdoor, 0), nullif(style_discount_outdoor, 0), 1.0)), 0) AS gmv
      FROM anta_daily.rpt_sales_sku_daily
      WHERE sales_date BETWEEN (current_date - interval '7 day')::date AND (current_date - interval '1 day')::date
        AND coalesce(sku, '') not ilike '%u%' AND coalesce(sku, '') not ilike '%v%'
    explanation: 户外渠道的 GMV = sales_outdoor_qty × tag_price × 折扣率

  - question: "哪个品类库存最多？"
    sql: |
      SELECT coalesce(nullif(trim(category), ''), '未分类') AS category,
             sum(inventory_total_qty) AS total_inventory
      FROM anta_daily.rpt_inventory_sku_latest
      WHERE coalesce(sku, '') not ilike '%u%' AND coalesce(sku, '') not ilike '%v%'
      GROUP BY 1
      ORDER BY total_inventory DESC
      LIMIT 10
    explanation: 从库存快照表按品类汇总库存，降序排列

  - question: "天猫旗舰上周卖了多少件？"
    sql: |
      SELECT coalesce(sum(sales_tmall_flagship_qty), 0) AS total_qty
      FROM anta_daily.rpt_sales_sku_daily
      WHERE sales_date BETWEEN (current_date - interval '7 day')::date AND (current_date - interval '1 day')::date
        AND coalesce(sku, '') not ilike '%u%' AND coalesce(sku, '') not ilike '%v%'
    explanation: 直接汇总天猫旗舰的销量列

  - question: "男性跑步鞋上个月 GMV 前 10 的 SKU？"
    sql: |
      SELECT sku, product_name,
             coalesce(sum(sales_total_qty * tag_price * coalesce(nullif(sku_discount_total, 0), nullif(style_discount_total, 0), 1.0)), 0) AS gmv,
             sum(sales_total_qty) AS total_qty
      FROM anta_daily.rpt_sales_sku_daily
      WHERE sales_date >= date_trunc('month', current_date - interval '1 month')::date
        AND sales_date < date_trunc('month', current_date)::date
        AND coalesce(nullif(trim(gender), ''), '未标记') = '男'
        AND coalesce(nullif(trim(category), ''), '未分类') ILIKE '%跑步%'
        AND coalesce(sku, '') not ilike '%u%' AND coalesce(sku, '') not ilike '%v%'
      GROUP BY sku, product_name
      ORDER BY gmv DESC
      LIMIT 10
    explanation: 按性别+品类筛选，全渠道汇总 GMV，降序取 Top 10

  - question: "得物渠道折扣率是多少？"
    sql: |
      SELECT avg(nullif(sku_discount_dewu, 0)) AS avg_discount
      FROM anta_daily.rpt_sales_sku_daily
      WHERE sales_date BETWEEN (current_date - interval '7 day')::date AND (current_date - interval '1 day')::date
        AND coalesce(sku, '') not ilike '%u%' AND coalesce(sku, '') not ilike '%v%'
        AND sales_dewu_qty > 0
    explanation: 只看得物有销量的行，取 SKU 折扣率均值

  - question: "各渠道上周 GMV 排名？"
    sql: |
      SELECT '女子' AS channel, coalesce(sum(sales_women_qty * tag_price * coalesce(nullif(sku_discount_women, 0), nullif(style_discount_women, 0), 1.0)), 0) AS gmv FROM anta_daily.rpt_sales_sku_daily WHERE sales_date BETWEEN (current_date - interval '7 day')::date AND (current_date - interval '1 day')::date AND coalesce(sku, '') not ilike '%u%' AND coalesce(sku, '') not ilike '%v%'
      UNION ALL
      SELECT '户外', coalesce(sum(sales_outdoor_qty * tag_price * coalesce(nullif(sku_discount_outdoor, 0), nullif(style_discount_outdoor, 0), 1.0)), 0) FROM anta_daily.rpt_sales_sku_daily WHERE sales_date BETWEEN (current_date - interval '7 day')::date AND (current_date - interval '1 day')::date AND coalesce(sku, '') not ilike '%u%' AND coalesce(sku, '') not ilike '%v%'
      -- ... 其余 20 个渠道同理 UNION ALL ...
      ORDER BY gmv DESC
    explanation: 每个渠道单独计算 GMV，UNION ALL 合并后排序。实际生成时应包含全部 22 个渠道

  - question: "今天哪些品类有库存断货风险（库存可售不到 7 天）？"
    sql: |
      WITH daily_avg AS (
        SELECT sku, coalesce(sum(sales_total_qty), 0) / 7.0 AS avg_daily
        FROM anta_daily.rpt_sales_sku_daily
        WHERE sales_date >= (current_date - interval '7 day')::date
          AND coalesce(sku, '') not ilike '%u%' AND coalesce(sku, '') not ilike '%v%'
        GROUP BY sku
      ),
      supply AS (
        SELECT i.sku, coalesce(nullif(trim(i.category), ''), '未分类') AS category,
               i.inventory_total_qty,
               CASE WHEN d.avg_daily > 0 THEN i.inventory_total_qty / d.avg_daily ELSE NULL END AS days_of_supply
        FROM anta_daily.rpt_inventory_sku_latest i
        LEFT JOIN daily_avg d ON d.sku = i.sku
        WHERE coalesce(i.sku, '') not ilike '%u%' AND coalesce(i.sku, '') not ilike '%v%'
      )
      SELECT category, count(*) AS at_risk_skus, sum(inventory_total_qty) AS at_risk_qty
      FROM supply
      WHERE days_of_supply IS NOT NULL AND days_of_supply < 7
      GROUP BY category
      ORDER BY at_risk_skus DESC
    explanation: 先算近 7 日日均销量，再用库存/日均算可售天数，筛出 <7 天的

  - question: "上月新上架的 SKU 动销率怎么样？"
    sql: |
      WITH new_skus AS (
        SELECT sku, min(sales_date) AS first_date
        FROM anta_daily.rpt_sales_sku_daily
        WHERE coalesce(sku, '') not ilike '%u%' AND coalesce(sku, '') not ilike '%v%'
        GROUP BY sku
        HAVING min(sales_date) >= date_trunc('month', current_date - interval '1 month')::date
          AND min(sales_date) < date_trunc('month', current_date)::date
      ),
      sku_sales AS (
        SELECT n.sku, coalesce(sum(s.sales_total_qty), 0) AS total_qty
        FROM new_skus n
        JOIN anta_daily.rpt_sales_sku_daily s ON s.sku = n.sku AND s.sales_date >= n.first_date
        WHERE coalesce(s.sku, '') not ilike '%u%' AND coalesce(s.sku, '') not ilike '%v%'
        GROUP BY n.sku
      )
      SELECT count(*) AS total_new_skus,
             count(case when total_qty > 0 then 1 end) AS sold_skus,
             round(count(case when total_qty > 0 then 1 end)::numeric / nullif(count(*), 0) * 100, 2) AS sell_through_pct
      FROM sku_sales
    explanation: 找上月首次出现的 SKU，计算有销量的比例
