# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# semantic.yml — 安踏电商语义模型
# 描述所有业务概念（表/列/渠道/指标/维度/关系/检测规则），
# 供 NL2SQL Agent 生成查询、巡检引擎读取阈值。
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

version: "1.0"
schema_name: anta_daily

# ─── 表定义 ──────────────────────────────────────────────────────────────────

tables:
  rpt_sales_sku_daily:
    description: SKU 粒度的每日销售宽表（按日期+SKU 聚合）
    schema: anta_daily
    primary_key: [sales_date, sku]
    columns:
      sales_date:
        type: date
        description: 销售日期
      sku:
        type: text
        description: 货号（SKU 编码）
      style:
        type: text
        description: 款号
      major_category:
        type: text
        description: 大品类（如：鞋/服装/配件）
      category:
        type: text
        description: 品类（如：跑步鞋/篮球鞋/羽绒服）
      product_name:
        type: text
        description: 品名
      tag_price:
        type: numeric
        description: 零售吊牌价（元）
      season:
        type: text
        description: 产品季（如：2025春夏）
      gender:
        type: text
        description: 性别（男/女/中性）
      story_pack:
        type: text
        description: 故事包（产品系列分组）
      # ── 销量列（22 渠道 + 1 合计）────────────────────────
      sales_women_qty:          { type: integer, description: "女子渠道销量" }
      sales_outdoor_qty:        { type: integer, description: "户外渠道销量" }
      sales_trend_qty:          { type: integer, description: "潮流渠道销量" }
      sales_casual_qty:         { type: integer, description: "休闲渠道销量" }
      sales_tmall_badminton_qty: { type: integer, description: "天猫羽球销量" }
      sales_tmall_outlet_qty:   { type: integer, description: "天猫奥莱销量" }
      sales_c_store_qty:        { type: integer, description: "C店销量" }
      sales_outlet_anjianli_qty: { type: integer, description: "奥莱安建立销量" }
      sales_tmall_flagship_qty: { type: integer, description: "天猫旗舰销量" }
      sales_tmall_franchise_qty: { type: integer, description: "天猫专卖销量" }
      sales_shanghai_franchise_qty: { type: integer, description: "上海专卖销量" }
      sales_jd_flagship_qty:    { type: integer, description: "京东旗舰销量" }
      sales_jd_franchise_qty:   { type: integer, description: "京东专卖销量" }
      sales_jd_self_qty:        { type: integer, description: "京自营销量" }
      sales_dewu_qty:           { type: integer, description: "得物销量" }
      sales_vip_qty:            { type: integer, description: "唯品销量" }
      sales_pdd_qty:            { type: integer, description: "拼多多销量" }
      sales_interest_qty:       { type: integer, description: "兴趣渠道销量" }
      sales_official_qty:       { type: integer, description: "官网销量" }
      sales_group_buy_qty:      { type: integer, description: "团购销量" }
      sales_distributor_qty:    { type: integer, description: "经销销量" }
      sales_other_qty:          { type: integer, description: "其他渠道销量" }
      sales_total_qty:          { type: integer, description: "全渠道销量合计" }
      # ── 金额列 ────────────────────────────────────────────
      sales_total_amount:       { type: numeric, description: "全渠道销售金额（实付）" }
      sales_total_tag_amount:   { type: numeric, description: "全渠道吊牌金额" }
      # ── SKU 级折扣率（22 渠道 + 1 合计）────────────────────
      sku_discount_women:       { type: numeric, description: "女子渠道 SKU 折扣率" }
      sku_discount_outdoor:     { type: numeric, description: "户外渠道 SKU 折扣率" }
      sku_discount_trend:       { type: numeric, description: "潮流渠道 SKU 折扣率" }
      sku_discount_casual:      { type: numeric, description: "休闲渠道 SKU 折扣率" }
      sku_discount_tmall_badminton: { type: numeric, description: "天猫羽球 SKU 折扣率" }
      sku_discount_tmall_outlet: { type: numeric, description: "天猫奥莱 SKU 折扣率" }
      sku_discount_c_store:     { type: numeric, description: "C店 SKU 折扣率" }
      sku_discount_outlet_anjianli: { type: numeric, description: "奥莱安建立 SKU 折扣率" }
      sku_discount_tmall_flagship: { type: numeric, description: "天猫旗舰 SKU 折扣率" }
      sku_discount_tmall_franchise: { type: numeric, description: "天猫专卖 SKU 折扣率" }
      sku_discount_shanghai_franchise: { type: numeric, description: "上海专卖 SKU 折扣率" }
      sku_discount_jd_flagship: { type: numeric, description: "京东旗舰 SKU 折扣率" }
      sku_discount_jd_franchise: { type: numeric, description: "京东专卖 SKU 折扣率" }
      sku_discount_jd_self:     { type: numeric, description: "京自营 SKU 折扣率" }
      sku_discount_dewu:        { type: numeric, description: "得物 SKU 折扣率" }
      sku_discount_vip:         { type: numeric, description: "唯品 SKU 折扣率" }
      sku_discount_pdd:         { type: numeric, description: "拼多多 SKU 折扣率" }
      sku_discount_interest:    { type: numeric, description: "兴趣渠道 SKU 折扣率" }
      sku_discount_official:    { type: numeric, description: "官网 SKU 折扣率" }
      sku_discount_group_buy:   { type: numeric, description: "团购 SKU 折扣率" }
      sku_discount_distributor: { type: numeric, description: "经销 SKU 折扣率" }
      sku_discount_other:       { type: numeric, description: "其他渠道 SKU 折扣率" }
      sku_discount_total:       { type: numeric, description: "全渠道 SKU 折扣率" }
      # ── 款级折扣率（22 渠道 + 1 合计）────────────────────
      style_discount_women:     { type: numeric, description: "女子渠道款折扣率" }
      style_discount_outdoor:   { type: numeric, description: "户外渠道款折扣率" }
      style_discount_trend:     { type: numeric, description: "潮流渠道款折扣率" }
      style_discount_casual:    { type: numeric, description: "休闲渠道款折扣率" }
      style_discount_tmall_badminton: { type: numeric, description: "天猫羽球款折扣率" }
      style_discount_tmall_outlet: { type: numeric, description: "天猫奥莱款折扣率" }
      style_discount_c_store:   { type: numeric, description: "C店款折扣率" }
      style_discount_outlet_anjianli: { type: numeric, description: "奥莱安建立款折扣率" }
      style_discount_tmall_flagship: { type: numeric, description: "天猫旗舰款折扣率" }
      style_discount_tmall_franchise: { type: numeric, description: "天猫专卖款折扣率" }
      style_discount_shanghai_franchise: { type: numeric, description: "上海专卖款折扣率" }
      style_discount_jd_flagship: { type: numeric, description: "京东旗舰款折扣率" }
      style_discount_jd_franchise: { type: numeric, description: "京东专卖款折扣率" }
      style_discount_jd_self:   { type: numeric, description: "京自营款折扣率" }
      style_discount_dewu:      { type: numeric, description: "得物款折扣率" }
      style_discount_vip:       { type: numeric, description: "唯品款折扣率" }
      style_discount_pdd:       { type: numeric, description: "拼多多款折扣率" }
      style_discount_interest:  { type: numeric, description: "兴趣渠道款折扣率" }
      style_discount_official:  { type: numeric, description: "官网款折扣率" }
      style_discount_group_buy: { type: numeric, description: "团购款折扣率" }
      style_discount_distributor: { type: numeric, description: "经销款折扣率" }
      style_discount_other:     { type: numeric, description: "其他渠道款折扣率" }
      style_discount_total:     { type: numeric, description: "全渠道款折扣率" }

  rpt_inventory_sku_latest:
    description: SKU 粒度的最新库存快照（每日覆盖写入）
    schema: anta_daily
    primary_key: [sku]
    columns:
      inventory_snapshot_date:
        type: date
        description: 库存快照日期
      sku:
        type: text
        description: 货号
      style:
        type: text
        description: 款号
      major_category:
        type: text
        description: 大品类
      category:
        type: text
        description: 品类
      product_name:
        type: text
        description: 品名
      tag_price:
        type: numeric
        description: 零售吊牌价（元）
      season:
        type: text
        description: 产品季
      gender:
        type: text
        description: 性别
      story_pack:
        type: text
        description: 故事包
      # ── 库存列（按仓/渠道）──────────────────────────────
      inv_huotong_qty:          { type: integer, description: "活通仓库存" }
      inv_women_qty:            { type: integer, description: "女子渠道库存" }
      inv_outdoor_qty:          { type: integer, description: "户外渠道库存" }
      inv_trend_qty:            { type: integer, description: "潮流渠道库存" }
      inv_casual_qty:           { type: integer, description: "休闲渠道库存" }
      inv_c_store_qty:          { type: integer, description: "C店库存" }
      inv_category_shared_qty:  { type: integer, description: "品类共享库存" }
      inv_tmall_outlet_qty:     { type: integer, description: "天猫奥莱库存" }
      inv_shared_qty:           { type: integer, description: "共享库存" }
      inv_tmall_flagship_qty:   { type: integer, description: "天猫旗舰库存" }
      inv_tmall_franchise_qty:  { type: integer, description: "天猫专卖库存" }
      inv_shanghai_franchise_qty: { type: integer, description: "上海专卖库存" }
      inv_jd_flagship_qty:      { type: integer, description: "京东旗舰库存" }
      inv_jd_franchise_qty:     { type: integer, description: "京东专卖库存" }
      inv_jd_self_qty:          { type: integer, description: "京自营库存" }
      inv_dewu_qty:             { type: integer, description: "得物库存" }
      inv_interest_qty:         { type: integer, description: "兴趣渠道库存" }
      inv_vip_qty:              { type: integer, description: "唯品库存" }
      inv_pdd_qty:              { type: integer, description: "拼多多库存" }
      inv_distributor_qty:      { type: integer, description: "经销库存" }
      inv_other_qty:            { type: integer, description: "其他渠道库存" }
      inventory_total_qty:      { type: integer, description: "全渠道库存合计" }

